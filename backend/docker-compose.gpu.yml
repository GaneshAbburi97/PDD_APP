version: "3.9"

# GPU-enabled docker-compose (requires nvidia-container-toolkit)
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: pdd-api-gpu
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-medical-processor-prod}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-medical-processor-prod.appspot.com}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service-account.json
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - MODEL_DEVICE=${MODEL_DEVICE:-cuda}
    volumes:
      - ./secrets:/secrets:ro
      - ./checkpoints:/app/checkpoints:ro
      - pdd_temp_gpu:/tmp/pdd_processing
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - pdd-network-gpu

  nginx:
    image: nginx:1.27-alpine
    container_name: pdd-nginx-gpu
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pdd-network-gpu

volumes:
  pdd_temp_gpu:

networks:
  pdd-network-gpu:
    driver: bridge
